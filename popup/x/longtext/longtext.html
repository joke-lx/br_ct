<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Queue Storage Example</title>
</head>
<body>
<h1>Queue Storage Example</h1>

<button id="add">Add Item</button>
<button id="consume">Consume Latest</button>
<div id="output"></div>

<script src="path/to/your/javascript/file.js"></script>
<script>
    document.getElementById('add').addEventListener('click', () => {
        const content = prompt("Enter item content:");
        if (content) {
            myQueue.push(content).then(() => {
                console.log(`Added: ${content}`);
            });
        }
    });

    document.getElementById('consume').addEventListener('click', async () => {
        const node = await myQueue.pop();
        if (node) {
            document.getElementById('output').innerText = `Consumed: ${node.content}`;
        } else {
            document.getElementById('output').innerText = 'Queue is empty';
        }
    });
</script>
</body>
</html>
