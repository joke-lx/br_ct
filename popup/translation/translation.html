<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>划词翻译设置</title>
  <link rel="stylesheet" href="../components/theme.css">
  <link rel="stylesheet" href="translation.css">
</head>
<body>
  <div class="translation-container">
    <!-- 标题容器：包含标题 + 返回按钮 -->
    <div class="header">
      <h1>划词翻译</h1>
      <!-- 横向展开目录 -->
      <div class="header-nav-menu">
        <a href="../main/main.html" class="header-nav-item">主页</a>
        <a href="../func_execute/functioncall.html" class="header-nav-item">函数库</a>
        <a href="./translation.html" class="header-nav-item active">划词翻译</a>
        <a href="../binddom/binddom.html" class="header-nav-item">快捷绑定</a>
        <span class="header-nav-item settings-link">设置</span>
      </div>
    </div>

    <div class="main-content">
      <!-- 划词翻译设置 -->
      <div class="setting-section">
        <div class="section-title">
          <span>📝 划词翻译设置</span>
        </div>
        <div class="setting-item">
          <label class="setting-label">提示词模板</label>
          <textarea
            id="selectionPromptInput"
            class="setting-textarea"
            placeholder="请输入提示词，使用 %s 作为选中文本的占位符..."
            rows="2"
          >请解释 %s</textarea>
          <small class="setting-hint">
            使用 %s 代表选中的文本，例如："请翻译 %s"、"请解释 %s 的含义"
          </small>
        </div>
        <label class="setting-item">
          <input type="checkbox" id="selectionStreamToggle" class="toggle" checked>
          <span class="toggle-label">流式输出（实时显示处理结果）</span>
        </label>
        <label class="setting-item">
          <input type="checkbox" id="selectionThinkingToggle" class="toggle">
          <span class="toggle-label">思考模式（显示 AI 推理过程）</span>
        </label>
      </div>

      <!-- OCR 设置 -->
      <div class="setting-section">
        <div class="section-title">
          <span>📷 OCR 设置</span>
        </div>
        <div class="setting-item">
          <label class="setting-label">识别提示词</label>
          <textarea
            id="ocrPromptInput"
            class="setting-textarea"
            placeholder="请输入 OCR 识别的提示词..."
            rows="2"
          >请识别图片中的所有文字内容</textarea>
        </div>
        <label class="setting-item">
          <input type="checkbox" id="ocrStreamToggle" class="toggle">
          <span class="toggle-label">流式输出（实时显示识别结果）</span>
        </label>
        <label class="setting-item">
          <input type="checkbox" id="ocrThinkingToggle" class="toggle">
          <span class="toggle-label">思考模式（显示 AI 推理过程）</span>
        </label>
        <label class="setting-item">
          <input type="checkbox" id="ocrSilentModeToggle" class="toggle">
          <span class="toggle-label">静默模式（只显示图片+状态灯，完成后自动复制）</span>
        </label>

        <!-- 流速控制 -->
        <div id="flowRateControl" class="flow-rate-control" style="display: none; margin-top: 12px;">
          <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 6px;">
            <label class="setting-label" style="margin: 0;">输出速度</label>
            <span id="flowRateValue" class="flow-rate-value">中等</span>
          </div>
          <input
            type="range"
            id="flowRateSlider"
            class="flow-rate-slider"
            min="1"
            max="5"
            step="1"
            value="3"
          >
          <div style="display: flex; justify-content: space-between; margin-top: 4px; font-size: 11px; color: #6c757d;">
            <span>慢速</span>
            <span>较快</span>
          </div>
          <div id="flowRateWarning" class="flow-rate-warning" style="display: none;">
            ⚠️ 输出速度较快可能导致页面卡顿
          </div>
        </div>
      </div>

      <!-- 功能开关 -->
      <div class="setting-section">
        <div class="section-title">
          <span>⚙️ 功能开关</span>
        </div>
        <label class="setting-item">
          <input type="checkbox" id="autoTranslate" class="toggle">
          <span class="toggle-label">自动翻译（选中文本后自动显示翻译）</span>
        </label>
        <label class="setting-item">
          <input type="checkbox" id="showContextMenu" class="toggle" checked>
          <span class="toggle-label">显示右键菜单</span>
        </label>
      </div>

      <!-- 快捷键设置 -->
      <div class="setting-section">
        <div class="section-title">
          <span>⌨️ 快捷键</span>
        </div>
        <div class="setting-item">
          <label class="setting-label">OCR 快捷键</label>
          <div class="shortcut-input-wrapper">
            <input
              type="text"
              id="ocrShortcutInput"
              class="shortcut-input"
              placeholder="点击设置快捷键..."
              readonly
            >
            <button id="clearOcrShortcutBtn" class="shortcut-clear-btn" title="清除快捷键">✕</button>
          </div>
          <small class="setting-hint">
            点击输入框，然后按下键盘组合键（如 Ctrl+Shift+O）
          </small>
        </div>
        <div class="setting-item">
          <label class="setting-label">收藏快捷键</label>
          <div class="shortcut-input-wrapper">
            <input
              type="text"
              id="favoritesShortcutInput"
              class="shortcut-input"
              placeholder="点击设置快捷键..."
              readonly
            >
            <button id="clearFavoritesShortcutBtn" class="shortcut-clear-btn" title="清除快捷键">✕</button>
          </div>
          <small class="setting-hint">
            选中文字后，按下快捷键即可收藏
          </small>
        </div>
      </div>

      <!-- 统计信息 -->
      <div class="setting-section">
        <div class="section-title">
          <span>📊 统计</span>
        </div>
        <div class="stats-row">
          <div class="stat-item">
            <span class="stat-label">今日翻译：</span>
            <span id="todayCount" class="stat-value">0</span>
          </div>
          <div class="stat-item">
            <span class="stat-label">总计翻译：</span>
            <span id="totalCount" class="stat-value">0</span>
          </div>
        </div>
      </div>
    </div>

    <!-- 底部按钮 -->
    <div class="footer">
      <button id="openFavoritesBtn" class="footer-btn">⭐ 收藏管理</button>
    </div>
  </div>

  <script src="translation.js" type="module"></script>
</body>
</html>
