<!DOCTYPE html>
<html>
  <head>
    <meta charset="UTF-8" />
    <title>AI Assistant - 多端AI调度工具</title>
    <link rel="stylesheet" href="../promots/promptsUI.css" />
    <link rel="stylesheet" href="../popup/popup.css" />
  </head>
  <body>
    <div class="header">
      <h1>AI Assistant</h1>
      <div class="header-nav-menu">
        <a href="popup.html" class="header-nav-item active">主页</a>
        <a href="./func_execute/add.html" class="header-nav-item">脚本库</a>
      </div>
    </div>

    <!-- 平台选择区 -->
    <div class="platform-selector">
      <div class="platform-selector-header">
        <h3>选择平台</h3>
        <div class="select-all" id="select-all">全选</div>
      </div>
      <div class="platform-options-row" id="platform-options-row">
        <label class="platform-icon-option">
          <input type="checkbox" data-platform="yuanbao" />
          <div class="icon-wrapper" data-platform-icon="元">元</div>
          <div class="platform-label">元宝</div>
        </label>
        <label class="platform-icon-option">
          <input type="checkbox" data-platform="chatgpt" />
          <div class="icon-wrapper" data-platform-icon="C">C</div>
          <div class="platform-label">ChatGPT</div>
        </label>
        <label class="platform-icon-option">
          <input type="checkbox" data-platform="claude" />
          <div class="icon-wrapper" data-platform-icon="A">A</div>
          <div class="platform-label">Claude</div>
        </label>
      </div>
    </div>

    <!-- 提示词优化选择框 -->
    <div class="prompt-optimizer-selector">
      <div class="custom-select" id="prompt-optimizer-select">
        <div class="selected-value">不使用优化</div>
        <div class="custom-select-options"></div>
      </div>
    </div>

    <!-- 动态输入区 -->
    <div id="dynamic-inputs">
      <!-- 自动根据模板生成多个输入框 -->
    </div>

    <!-- 发送按钮 -->
    <div class="button-group">
      <button class="send-button" id="send-button">发送消息</button>
    </div>

    <!-- 引用脚本 -->
    <script src="../promots/multpromots.js"></script>
    <script src="../promots/promptsUI.js" type="module"></script>
    <script src="../dragDropHandler.js" type="module"></script>
    <script src="./multpopupUtils.js" type="module"></script>
    <script src="./multpromots.js" type="module"></script>
  </body>
</html>
