<!DOCTYPE html>
<html>
  <head>
    <meta charset="UTF-8" />
    <title>AI Assistant 选项设置</title>
    <link rel="stylesheet" href="options.css" />
  </head>
  <body>
    <div class="container">
      <header>
        <h1>AI Assistant 设置</h1>
        <p>自定义你的多端AI调度工具</p>
      </header>

      <section class="settings-group">
        <h2>API 配置</h2>
        <div class="setting-item">
          <label for="yuanbao-api-key">元宝 API Key</label>
          <input
            type="password"
            id="yuanbao-api-key"
            placeholder="输入元宝API密钥"
          />
        </div>
        <div class="setting-item">
          <label for="gemini-api-key">Gemini API Key</label>
          <input
            type="password"
            id="gemini-api-key"
            placeholder="输入GeminiAPI密钥"
          />
        </div>
      </section>

      <section class="settings-group">
        <h2>界面设置</h2>
        <div class="setting-item">
          <label for="theme-select">主题颜色</label>
          <select id="theme-select">
            <option value="light">浅色模式</option>
            <option value="dark">深色模式</option>
            <option value="system">跟随系统</option>
          </select>
        </div>
        <div class="setting-item">
          <label>
            <input type="checkbox" id="notifications-enable" />
            启用通知提醒
          </label>
        </div>
      </section>

      <section class="settings-group">
        <h2>快捷键设置</h2>
        <div class="shortcut-info">
          <p>当前快捷键（可在浏览器扩展管理中修改）：</p>
          <ul>
            <li>执行 div Copy 脚本：<kbd>Alt+C</kbd></li>
            <li>执行图片选择脚本：<kbd>Alt+D</kbd></li>
          </ul>
          <small
            >提示：在
            <code>chrome://extensions/shortcuts</code> 中自定义快捷键</small
          >
        </div>
      </section>

      <div class="button-group">
        <button id="save-btn" class="primary-btn">保存设置</button>
        <button id="reset-btn" class="secondary-btn">重置默认</button>
      </div>

      <div id="status-message" class="status-message"></div>
    </div>

    <script src="options.js"></script>
  </body>
</html>
