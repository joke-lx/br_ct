<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>快捷绑定</title>
  <link rel="stylesheet" href="../main/main.css">
  <link rel="stylesheet" href="binddom.css">
</head>
<body>
  <div class="container">
    <!-- 标题容器：包含标题 + 横向目录 -->
    <div class="header">
      <h1>快捷绑定</h1>
      <!-- 横向展开目录 -->
      <div class="header-nav-menu">
        <a href="../main/main.html" class="header-nav-item">主页</a>
        <a href="../func_execute/functioncall.html" class="header-nav-item">函数库</a>
        <a href="../translation/translation.html" class="header-nav-item">划词翻译</a>
        <a href="./binddom.html" class="header-nav-item active">快捷绑定</a>
        <span class="header-nav-item settings-link">设置</span>
      </div>
    </div>

    <div class="content">
      <!-- 快捷键 -->
      <div class="section">
        <div class="section-title">⌨️ 快捷键</div>
        <div class="shortcut-row">
          <input type="text" id="shortcutInput" class="shortcut-input" value="Alt+B" readonly>
        </div>
        <small class="hint">在 chrome://extensions/shortcuts 自定义快捷键</small>
      </div>

      <!-- 绑定列表 -->
      <div class="section">
        <div class="section-title">
          <span>🔗 绑定列表</span>
        </div>
        <div class="add-buttons">
          <button id="addBtnManual" class="add-btn manual">📝 手动添加</button>
          <button id="addBtnPicker" class="add-btn picker">🎯 拾取器添加</button>
        </div>
        <div id="bindingsList"></div>
        <div id="emptyState" class="empty">暂无绑定</div>
      </div>
    </div>

    <!-- 底部 -->
    <div class="footer">
      <button id="executeBtn" class="execute-btn">🚀 执行绑定</button>
      <div class="status"><span id="statusText">就绪</span></div>
    </div>

    <!-- 弹窗 -->
    <div id="bindingModal" class="modal" style="display:none">
      <div class="modal-content">
        <div class="modal-header">
          <h2 id="modalTitle">添加绑定</h2>
          <button id="closeModal" class="close-btn">×</button>
        </div>
        <div class="modal-body">
          <label>目标 URL</label>
          <input type="text" id="bindingUrlInput" placeholder="https://example.com/page">
          <small class="hint">支持完整 URL 或仅域名</small>

          <label>选择器</label>
          <div class="selector-row">
            <input type="text" id="bindingSelectorInput" placeholder="css:#id 或 xpath://div/button">
            <button id="pickBtn" class="pick-btn">🎯 拾取</button>
          </div>
          <small class="hint">格式: css:#id 或 xpath://div 或混用 ; 分隔多个</small>

          <label>描述（可选）</label>
          <input type="text" id="bindingDescInput" placeholder="如：关闭按钮">
        </div>
        <div class="modal-footer">
          <button id="cancelBtn" class="cancel-btn">取消</button>
          <button id="saveBindingBtn" class="save-btn" disabled>保存</button>
        </div>
      </div>
    </div>
  </div>
  <script src="binddom.js"></script>
</body>
</html>
