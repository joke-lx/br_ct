<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>添加新任务</title>
  <style>
    body {
      width: 400px;
      padding: 20px;
      font-family: Arial, sans-serif;
      background-color: #f5f5f5;
    }
    .header {
      text-align: center;
      margin-bottom: 20px;
      padding-bottom: 10px;
      border-bottom: 1px solid #ddd;
    }
    .header h1 {
      font-size: 20px;
      color: #333;
    }
    .back-button {
      display: block;
      width: 100%;
      padding: 12px;
      background-color: #6c757d;
      color: white;
      border: none;
      border-radius: 4px;
      font-size: 16px;
      font-weight: 500;
      cursor: pointer;
      text-align: center;
      text-decoration: none; /* 移除链接下划线 */
      transition: background-color 0.2s;
    }
    .back-button:hover {
      background-color: #5a6268;
    }
  </style>
</head>
<body>
  <div class="header">
    <h1>新任务添加页面</h1>
    <p>该页面仅为示例，用于演示页面跳转。</p>
  </div>
  <!-- 使用a标签就可以进跳转  -->
  <a href="popup.html" class="back-button">返回主页</a>
</body>
</html>
