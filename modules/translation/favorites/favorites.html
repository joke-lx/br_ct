<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>我的收藏</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }    
    body {  
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
      padding: 20px;
      max-width: 800px;
      margin: 0 auto;
      line-height: 1.6;
      background: #f5f5f5;
      min-height: 100vh;
    }
    .container {
      background: white;
      padding: 30px;
      border-radius: 12px;
      box-shadow: 0 10px 40px rgba(0,0,0,0.2);
      animation: fadeIn 0.3s ease-in-out;
    }
    @keyframes fadeIn {
      from {
        opacity: 0;
        transform: translateY(-20px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }
    h1 {
      color: #495057;
      border-bottom: 3px solid #dee2e6;
      padding-bottom: 15px;
      margin-bottom: 30px;
      font-size: 28px;
      display: flex;
      align-items: center;
    }
    h1::before {
      content: '⭐';
      margin-right: 10px;
    }
    .favorite-item {
      margin-bottom: 20px;
      padding: 15px;
      border: 1px solid #e0e0e0;
      border-radius: 10px;
      background: #fafafa;
      transition: all 0.3s ease;
    }
    .favorite-item:hover {
      transform: translateY(-3px);
      box-shadow: 0 6px 20px rgba(0,0,0,0.15);
      background: white;
    }
    .favorite-text {
      color: #333;
      margin-bottom: 12px;
      font-size: 15px;
      background: #f0f0f0;
      padding: 12px;
      border-radius: 6px;
      border-left: 4px solid #adb5bd;
      word-wrap: break-word;
      font-weight: 500;
    }
    .favorite-url {
      color: #6c757d;
      margin-bottom: 8px;
      font-size: 13px;
      word-break: break-all;
      cursor: pointer;
      transition: color 0.2s;
    }
    .favorite-url:hover {
      color: #495057;
      text-decoration: underline;
    }
    .timestamp {
      color: #999;
      font-size: 12px;
      text-align: right;
    }
    .empty-message {
      text-align: center;
      color: #666;
      padding: 60px 20px;
      font-size: 16px;
    }
    .empty-message::before {
      content: '📚';
      display: block;
      font-size: 60px;
      margin-bottom: 20px;
    }
    .clear-favorites {
      margin-top: 20px;
      padding: 12px 24px;
      background: #f44336;
      color: white;
      border: none;
      border-radius: 8px;
      cursor: pointer;
      font-size: 14px;
      font-weight: 500;
      transition: all 0.3s ease;
      box-shadow: 0 4px 15px rgba(255, 107, 107, 0.3);
    }
    .clear-favorites:hover {
      transform: translateY(-2px);
      box-shadow: 0 6px 20px rgba(255, 107, 107, 0.4);
    }
    .header-actions {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 25px;
      padding: 15px;
      background: #f8f9fa;
      border-radius: 8px;
    }
    .count {
      color: #495057;
      font-size: 15px;
      font-weight: 500;
    }
    .count::before {
      content: '📊 ';
    }
    .export-btn {
      padding: 10px 20px;
      background: #6c757d;
      color: white;
      border: none;
      border-radius: 8px;
      cursor: pointer;
      font-size: 14px;
      font-weight: 500;
      transition: all 0.3s ease;
      box-shadow: 0 4px 15px rgba(108, 117, 125, 0.3);
    }
    .export-btn:hover {
      background: #5a6268;
      transform: translateY(-2px);
      box-shadow: 0 6px 20px rgba(108, 117, 125, 0.4);
    }
    .delete-btn {
      padding: 6px 14px;
      background: #f44336;
      color: white;
      border: none;
      border-radius: 6px;
      cursor: pointer;
      font-size: 12px;
      font-weight: 500;
      transition: all 0.2s ease;
    }
    .delete-btn:hover {
      background: #d32f2f;
      transform: scale(1.05);
    }
    @media (max-width: 600px) {
      body {
        padding: 10px;
      }
      .container {
        padding: 20px;
      }
      .header-actions {
        flex-direction: column;
        gap: 15px;
      }
      .export-btn {
        width: 100%;
      }
      h1 {
        font-size: 22px;
      }
    }
    .favorite-header {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      gap: 10px;
    }
    .favorite-content {
      flex: 1;
      min-width: 0;
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>我的收藏</h1>

    <div class="header-actions">
      <span class="count" id="favoritesCount">共 0 条收藏</span>
      <button id="exportBtn" class="export-btn">📥 导出收藏</button>
    </div>

    <div id="favoritesList">
      <div class="empty-message">正在加载收藏列表...</div>
    </div>

    <button id="clearBtn" class="clear-favorites" style="display: none;">🗑️ 清空收藏列表</button>
  </div>

  <script src="favorites.js"></script>
</body>
</html>
