<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>浏览器原生收藏夹</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
      padding: 20px;
      max-width: 1200px;
      margin: 0 auto;
      line-height: 1.6;
      background: #f5f5f5;
      min-height: 100vh;
    }
    .container {
      background: white;
      padding: 30px;
      border-radius: 12px;
      box-shadow: 0 10px 40px rgba(0,0,0,0.2);
      animation: fadeIn 0.3s ease-in-out;
    }
    @keyframes fadeIn {
      from {
        opacity: 0;
        transform: translateY(-20px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }
    h1 {
      color: #495057;
      border-bottom: 3px solid #dee2e6;
      padding-bottom: 15px;
      margin-bottom: 30px;
      font-size: 28px;
      display: flex;
      align-items: center;
    }
    h1::before {
      content: '🔖';
      margin-right: 10px;
    }
    .header-actions {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 25px;
      padding: 15px;
      background: #f8f9fa;
      border-radius: 8px;
      flex-wrap: wrap;
      gap: 15px;
    }
    .search-box {
      flex: 1;
      min-width: 200px;
    }
    .search-box input {
      width: 100%;
      padding: 10px 15px;
      border: 2px solid #e0e0e0;
      border-radius: 8px;
      font-size: 14px;
      transition: border-color 0.3s;
    }
    .search-box input:focus {
      outline: none;
      border-color: #adb5bd;
    }
    .stats {
      color: #495057;
      font-size: 14px;
      font-weight: 500;
    }
    .stats::before {
      content: '📊 ';
    }
    .folder {
      margin-bottom: 30px;
    }
    .folder-header {
      background: #e9ecef;
      color: #495057;
      padding: 15px 20px;
      border-radius: 10px;
      margin-bottom: 15px;
      cursor: pointer;
      display: flex;
      justify-content: space-between;
      align-items: center;
      transition: transform 0.2s, box-shadow 0.2s;
    }
    .folder-header:hover {
      background: #dee2e6;
      transform: translateY(-2px);
      box-shadow: 0 6px 20px rgba(0, 0, 0, 0.1);
    }
    .folder-title {
      font-size: 18px;
      font-weight: 600;
      display: flex;
      align-items: center;
    }
    .folder-title::before {
      content: '📁';
      margin-right: 10px;
    }
    .folder-count {
      background: rgba(255, 255, 255, 0.6);
      padding: 5px 12px;
      border-radius: 20px;
      font-size: 13px;
    }
    .folder-content {
      display: none;
      padding: 0 10px;
    }
    .folder-content.active {
      display: block;
      animation: slideDown 0.3s ease-out;
    }
    @keyframes slideDown {
      from {
        opacity: 0;
        transform: translateY(-10px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }
    .bookmark-item {
      display: flex;
      align-items: center;
      padding: 12px 15px;
      margin-bottom: 10px;
      background: #f8f9fa;
      border-radius: 8px;
      border-left: 4px solid #adb5bd;
      transition: all 0.2s ease;
      cursor: pointer;
    }
    .bookmark-item:hover {
      background: white;
      transform: translateX(5px);
      box-shadow: 0 4px 15px rgba(0,0,0,0.1);
    }
    .bookmark-favicon {
      width: 16px;
      height: 16px;
      margin-right: 12px;
      flex-shrink: 0;
    }
    .bookmark-favicon img {
      width: 100%;
      height: 100%;
      object-fit: contain;
    }
    .bookmark-info {
      flex: 1;
      min-width: 0;
    }
    .bookmark-title {
      font-size: 14px;
      font-weight: 500;
      color: #333;
      margin-bottom: 4px;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .bookmark-url {
      font-size: 12px;
      color: #666;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .bookmark-date {
      font-size: 11px;
      color: #999;
      margin-left: auto;
      padding-left: 15px;
      flex-shrink: 0;
    }
    .nested-folder {
      margin-left: 20px;
      border-left: 2px solid #e0e0e0;
      padding-left: 15px;
    }
    .loading {
      text-align: center;
      padding: 60px 20px;
      color: #666;
      font-size: 16px;
    }
    .loading::before {
      content: '⏳';
      display: block;
      font-size: 60px;
      margin-bottom: 20px;
      animation: pulse 1.5s infinite;
    }
    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.5; }
    }
    .empty {
      text-align: center;
      padding: 60px 20px;
      color: #666;
      font-size: 16px;
    }
    .empty::before {
      content: '📭';
      display: block;
      font-size: 60px;
      margin-bottom: 20px;
    }
    .no-results {
      text-align: center;
      padding: 40px 20px;
      color: #666;
      font-size: 15px;
    }
    .toggle-btn {
      background: none;
      border: none;
      color: #495057;
      font-size: 20px;
      cursor: pointer;
      transition: transform 0.3s;
    }
    .toggle-btn.expanded {
      transform: rotate(180deg);
    }
    /* 操作按钮样式 */
    .actions-bar {
      display: flex;
      gap: 10px;
      margin-bottom: 20px;
      flex-wrap: wrap;
    }
    .btn {
      padding: 10px 18px;
      border: none;
      border-radius: 8px;
      font-size: 14px;
      font-weight: 500;
      cursor: pointer;
      transition: all 0.2s;
      display: flex;
      align-items: center;
      gap: 6px;
    }
    .btn-primary {
      background: #6c757d;
      color: white;
    }
    .btn-primary:hover {
      background: #5a6268;
      transform: translateY(-1px);
    }
    .btn-danger {
      background: #dc3545;
      color: white;
    }
    .btn-danger:hover {
      background: #c82333;
    }
    .btn-sm {
      padding: 5px 10px;
      font-size: 12px;
    }
    .bookmark-actions {
      display: none;
      gap: 5px;
      margin-left: 10px;
    }
    .bookmark-item:hover .bookmark-actions {
      display: flex;
    }
    .folder-actions {
      display: none;
      gap: 5px;
    }
    .folder-header:hover .folder-actions {
      display: flex;
    }
    /* 弹窗样式 */
    .modal-overlay {
      display: none;
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
      background: rgba(0,0,0,0.5);
      z-index: 1000;
      justify-content: center;
      align-items: center;
    }
    .modal-overlay.active {
      display: flex;
    }
    .modal {
      background: white;
      padding: 30px;
      border-radius: 12px;
      width: 90%;
      max-width: 500px;
      box-shadow: 0 10px 40px rgba(0,0,0,0.3);
      animation: modalFadeIn 0.2s ease-out;
    }
    @keyframes modalFadeIn {
      from {
        opacity: 0;
        transform: scale(0.9);
      }
      to {
        opacity: 1;
        transform: scale(1);
      }
    }
    .modal h2 {
      color: #6c757d;
      margin-bottom: 20px;
      font-size: 20px;
    }
    .form-group {
      margin-bottom: 15px;
    }
    .form-group label {
      display: block;
      margin-bottom: 5px;
      color: #495057;
      font-weight: 500;
    }
    .form-group input,
    .form-group select {
      width: 100%;
      padding: 10px;
      border: 2px solid #e0e0e0;
      border-radius: 8px;
      font-size: 14px;
    }
    .form-group input:focus,
    .form-group select:focus {
      outline: none;
      border-color: #adb5bd;
    }
    .modal-buttons {
      display: flex;
      gap: 10px;
      justify-content: flex-end;
      margin-top: 20px;
    }
    /* 拖拽样式 */
    .bookmark-item.dragging {
      opacity: 0.5;
      background: #e9ecef;
    }
    .bookmark-item.drag-over {
      border-left: 4px solid #6c757d;
      background: #e9ecef;
    }
    .folder-content.drag-over-folder {
      background: #e9ecef;
      border-radius: 8px;
    }
    @media (max-width: 600px) {
      body {
        padding: 10px;
      }
      .container {
        padding: 20px;
      }
      .header-actions {
        flex-direction: column;
        align-items: stretch;
      }
      h1 {
        font-size: 22px;
      }
      .folder-header {
        padding: 12px 15px;
      }
      .folder-title {
        font-size: 16px;
      }
      .nested-folder {
        margin-left: 10px;
        padding-left: 10px;
      }
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>浏览器原生收藏夹</h1>

    <div class="actions-bar">
      <button class="btn btn-primary" id="addBookmarkBtn">➕ 添加书签</button>
      <button class="btn btn-primary" id="addFolderBtn">📁 添加文件夹</button>
    </div>

    <div class="header-actions">
      <div class="search-box">
        <input type="text" id="searchInput" placeholder="搜索收藏夹...">
      </div>
      <div class="stats" id="stats">正在加载...</div>
    </div>

    <div id="bookmarksContainer">
      <div class="loading">正在加载收藏夹...</div>
    </div>
  </div>

  <!-- 添加书签弹窗 -->  
  <div class="modal-overlay" id="addBookmarkModal">
    <div class="modal">
      <h2>添加书签</h2>
      <form id="addBookmarkForm">
        <div class="form-group">
          <label>标题</label>
          <input type="text" id="newBookmarkTitle" required placeholder="请输入书签标题">
        </div>
        <div class="form-group">
          <label>URL</label>
          <input type="url" id="newBookmarkUrl" required placeholder="https://example.com">
        </div>
        <div class="form-group">
          <label>保存到</label>
          <select id="newBookmarkParent"></select>
        </div>
        <div class="modal-buttons">
          <button type="button" class="btn" data-action="closeModal" data-target="addBookmarkModal">取消</button>
          <button type="submit" class="btn btn-primary">添加</button>
        </div>
      </form>
    </div>
  </div>

  <!-- 添加文件夹弹窗 -->
  <div class="modal-overlay" id="addFolderModal">
    <div class="modal">
      <h2>添加文件夹</h2>
      <form id="addFolderForm">
        <div class="form-group">
          <label>文件夹名称</label>
          <input type="text" id="newFolderTitle" required placeholder="请输入文件夹名称">
        </div>
        <div class="form-group">
          <label>保存到</label>
          <select id="newFolderParent"></select>
        </div>
        <div class="modal-buttons">
          <button type="button" class="btn" data-action="closeModal" data-target="addFolderModal">取消</button>
          <button type="submit" class="btn btn-primary">添加</button>
        </div>
      </form>
    </div>
  </div>

  <!-- 编辑书签弹窗 -->
  <div class="modal-overlay" id="editBookmarkModal">
    <div class="modal">
      <h2>编辑书签</h2>
      <form id="editBookmarkForm">
        <input type="hidden" id="editBookmarkId">
        <div class="form-group">
          <label>标题</label>
          <input type="text" id="editBookmarkTitle" required>
        </div>
        <div class="form-group">
          <label>URL</label>
          <input type="url" id="editBookmarkUrl" required>
        </div>
        <div class="modal-buttons">
          <button type="button" class="btn" data-action="closeModal" data-target="editBookmarkModal">取消</button>
          <button type="submit" class="btn btn-primary">保存</button>
        </div>
      </form>
    </div>
  </div>

  <!-- 移动书签弹窗 -->
  <div class="modal-overlay" id="moveBookmarkModal">
    <div class="modal">
      <h2>移动到</h2>
      <form id="moveBookmarkForm">
        <input type="hidden" id="moveBookmarkId">
        <div class="form-group">
          <label>选择目标文件夹</label>
          <select id="moveBookmarkTarget"></select>
        </div>
        <div class="modal-buttons">
          <button type="button" class="btn" data-action="closeModal" data-target="moveBookmarkModal">取消</button>
          <button type="submit" class="btn btn-primary">移动</button>
        </div>
      </form>
    </div>
  </div>

  <script src="browser-bookmarks.js"></script>
</body>
</html>
