<!DOCTYPE html>
<html>
  <head>
    <meta charset="UTF-8" />
    <title>存储调试</title>
    <link rel="stylesheet" href="../options.css" />
    <style>
      .backup-status-card {
        background: linear-gradient(135deg, #e3f2fd 0%, #bbdefb 100%);
        border-radius: 12px;
        padding: 16px 20px;
        margin-bottom: 20px;
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 16px;
      }

      .backup-status-info {
        flex: 1;
      }

      .backup-status-title {
        font-size: 16px;
        font-weight: 600;
        color: #1565c0;
        margin-bottom: 4px;
      }

      .backup-status-time {
        font-size: 13px;
        color: #1976d2;
      }

      .backup-status-time.never {
        color: #ef5350;
        font-style: italic;
      }
    </style>
  </head>
  <body>
    <div class="page-container">
      <header class="page-header">
        <h1 class="page-title">🔍 存储调试</h1>
        <p class="page-description">
          查看插件在 chrome.storage.local 中存储的所有数据
        </p>
      </header>

      <section class="section">
        <div class="backup-status-card">
          <div class="backup-status-info">
            <div class="backup-status-title">💾 数据备份</div>
            <div class="backup-status-time" id="last-backup-time">加载中...</div>
          </div>
          <button class="btn btn-primary" id="backup-now-btn">📥 立即备份</button>
        </div>

        <div class="debug-controls">
          <button class="btn btn-success" id="refresh-storage">🔄 刷新</button>
          <button class="btn btn-danger" id="clear-storage">🗑️ 清空</button>
        </div>

        <div class="debug-content" id="storage-debug-content">
          <!-- 存储数据将由 JavaScript 动态生成 -->
        </div>

        <div id="storage-status-message" class="status-message"></div>
      </section>
    </div>

    <script src="storage.js"></script>
  </body>
</html>
