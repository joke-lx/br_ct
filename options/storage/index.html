<!DOCTYPE html>
<html>
  <head>
    <meta charset="UTF-8" />
    <title>存储调试</title>
    <link rel="stylesheet" href="../options.css" />
    <style>
      .backup-status-card {
        background: rgba(255, 252, 247, 0.82);
        border-radius: 12px;
        padding: 16px 20px;
        margin-bottom: 20px;
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 16px;
      }

      .backup-status-info {
        flex: 1;
      }

      .backup-status-title {
        font-size: 16px;
        font-weight: 600;
        color: #2d241c;
        margin-bottom: 4px;
      }

      .backup-status-time {
        font-size: 13px;
        color: #7a6858;
      }

      .backup-status-time.never {
        color: #ef5350;
        font-style: italic;
      }

      /* JSON 递归显示样式 */
      .json-tree {
        font-family: 'Consolas', 'Monaco', 'Courier New', monospace;
        font-size: 13px;
        line-height: 1.5;
      }

      .json-item {
        margin-left: 20px;
        position: relative;
      }

      .json-item > .json-key::before {
        content: '';
        position: absolute;
        left: -15px;
        top: 0;
        bottom: 0;
        width: 1px;
        background: #dee2e6;
      }

      .json-key {
        color: #7a4d2b;
        font-weight: 500;
      }

      .json-string {
        color: #465f72;
      }

      .json-number {
        color: #6c4b31;
      }

      .json-boolean {
        color: #8250df;
      }

      .json-null {
        color: #6e7781;
        font-style: italic;
      }

      .json-object {
        color: #6e7781;
      }

      .json-collapsible {
        cursor: pointer;
        user-select: none;
      }

      .json-collapsible:hover {
        background: rgba(9, 105, 218, 0.05);
      }

      .json-collapsible::before {
        content: '▼';
        display: inline-block;
        width: 12px;
        color: #6e7781;
        font-size: 10px;
        margin-right: 4px;
        transition: transform 0.2s;
      }

      .json-collapsible.collapsed::before {
        transform: rotate(-90deg);
      }

      .json-collapsed {
        display: none;
      }

      .delete-key-btn {
        padding: 2px 8px;
        font-size: 11px;
        margin-left: 8px;
        background: #dc3545;
        color: white;
        border: none;
        border-radius: 4px;
        cursor: pointer;
        opacity: 0.7;
        transition: opacity 0.2s;
      }

      .delete-key-btn:hover {
        opacity: 1;
      }

      .storage-item-header:hover .delete-key-btn {
        opacity: 1;
      }
      .backup-status-card {
        border-radius: 20px;
      }

      .backup-status-title {
        color: #2d241c;
      }

      .backup-status-time {
        color: #7a6858;
      }

      .backup-status-time.never {
        color: #9a4f40;
      }

      .json-item > .json-key::before {
        background: rgba(93, 67, 43, 0.12);
      }

      .json-collapsible:hover {
        background: rgba(107, 74, 49, 0.05);
      }

      .delete-key-btn {
        background: rgba(154, 79, 64, 0.14);
        color: #7a3025;
        border-radius: 999px;
      }
    </style>
  </head>
  <body>
    <div class="page-container">
      <header class="page-header">
        <h1 class="page-title">存储调试</h1>
        <p class="page-description">
          查看插件在 chrome.storage.local 中存储的所有数据
        </p>
      </header>

      <section class="section">
        <div class="backup-status-card">
          <div class="backup-status-info">
            <div class="backup-status-title">数据备份</div>
            <div class="backup-status-time" id="last-backup-time">加载中...</div>
          </div>
          <button class="btn btn-primary" id="backup-now-btn">立即备份</button>
        </div>

        <div class="debug-controls">
          <button class="btn btn-success" id="refresh-storage">刷新</button>
          <button class="btn btn-danger" id="clear-storage">清空所有</button>
        </div>

        <div class="debug-content" id="storage-debug-content">
          <!-- 存储数据将由 JavaScript 动态生成 -->
        </div>

        <div id="storage-status-message" class="status-message"></div>
      </section>
    </div>

    <script src="storage.js"></script>
  </body>
</html>
