<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>分组管理</title>
  <link rel="stylesheet" href="../options.css" />
  <style>
    body {
      background: var(--paper);
      min-height: 100vh;
    }
    .groups-container {
      max-width: 1200px;
      margin: 0 auto;
      padding: 24px 20px;
    }
    .groups-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 20px;
      padding-bottom: 16px;
      border-bottom: 2px solid var(--line);
    }
    .groups-header h1 {
      font-size: 24px;
      margin: 0;
    }
    .groups-layout {
      display: flex;
      gap: 20px;
      height: calc(100vh - 140px);
    }
    /* 左侧：分组列表 */
    .groups-panel {
      width: 280px;
      flex-shrink: 0;
      display: flex;
      flex-direction: column;
      background: rgba(255, 252, 247, 0.72);
      border: 1px solid var(--line);
      border-radius: var(--radius-md);
      overflow: hidden;
    }
    .groups-panel-header {
      padding: 12px 16px;
      background: var(--paper);
      border-bottom: 1px solid var(--line);
      display: flex;
      align-items: center;
      justify-content: space-between;
    }
    .groups-panel-header .panel-title {
      font-weight: 600;
      font-size: 14px;
    }
    .groups-panel-body {
      flex: 1;
      overflow-y: auto;
      padding: 8px;
    }
    .group-item {
      padding: 12px 14px;
      border-radius: 8px;
      margin-bottom: 6px;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: space-between;
      border: 1px solid transparent;
      transition: all 120ms ease;
    }
    .group-item:hover {
      background: rgba(107, 74, 49, 0.06);
    }
    .group-item.selected {
      background: rgba(107, 74, 49, 0.12);
      border-color: rgba(107, 74, 49, 0.3);
    }
    .group-item.ungrouped {
      border: 1px dashed var(--line);
      opacity: 0.8;
    }
    .group-item-info {
      flex: 1;
      min-width: 0;
    }
    .group-item-name {
      font-weight: 600;
      font-size: 14px;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .group-item-count {
      font-size: 12px;
      color: var(--muted);
      margin-top: 2px;
    }
    .group-item-actions {
      display: flex;
      gap: 4px;
      opacity: 0;
      transition: opacity 120ms ease;
    }
    .group-item:hover .group-item-actions {
      opacity: 1;
    }
    .group-delete-btn {
      width: 24px;
      height: 24px;
      min-height: 24px;
      padding: 0;
      border-radius: 4px;
      font-size: 14px;
      line-height: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      color: var(--muted);
      background: transparent;
      border: none;
      cursor: pointer;
    }
    .group-delete-btn:hover {
      background: rgba(154, 79, 64, 0.15);
      color: #9a4f40;
    }
    .add-group-btn {
      margin: 8px;
      width: calc(100% - 16px);
    }
    /* 右侧：Skill 列表 */
    .skills-panel {
      flex: 1;
      display: flex;
      flex-direction: column;
      background: rgba(255, 252, 247, 0.72);
      border: 1px solid var(--line);
      border-radius: var(--radius-md);
      overflow: hidden;
    }
    .skills-panel-header {
      padding: 12px 16px;
      background: var(--paper);
      border-bottom: 1px solid var(--line);
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
    }
    .skills-panel-header .panel-title {
      font-weight: 600;
      font-size: 14px;
    }
    .skills-search {
      flex: 1;
      max-width: 300px;
      padding: 6px 12px;
      border: 1px solid var(--line-strong);
      border-radius: 8px;
      font-size: 13px;
      background: rgba(255, 255, 255, 0.92);
      outline: none;
    }
    .skills-search:focus {
      border-color: rgba(107, 74, 49, 0.4);
    }
    .batch-actions {
      display: flex;
      align-items: center;
      gap: 8px;
    }
    .skills-panel-body {
      flex: 1;
      overflow-y: auto;
      padding: 12px;
    }
    /* 按分组折叠的 Skill */
    .skill-group-section {
      margin-bottom: 16px;
    }
    .skill-group-header {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 8px 12px;
      background: rgba(107, 74, 49, 0.06);
      border-radius: 8px;
      cursor: pointer;
      margin-bottom: 8px;
      user-select: none;
    }
    .skill-group-header:hover {
      background: rgba(107, 74, 49, 0.1);
    }
    .skill-group-toggle {
      width: 20px;
      height: 20px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 12px;
      color: var(--muted);
      transition: transform 120ms ease;
    }
    .skill-group-toggle.collapsed {
      transform: rotate(-90deg);
    }
    .skill-group-name {
      flex: 1;
      font-weight: 600;
      font-size: 13px;
    }
    .skill-group-count {
      font-size: 12px;
      color: var(--muted);
      background: rgba(255, 255, 255, 0.7);
      padding: 2px 8px;
      border-radius: 10px;
    }
    .skill-group-items {
      padding-left: 8px;
    }
    .skill-group-items.hidden {
      display: none;
    }
    .skill-item {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 10px 14px;
      border: 1px solid var(--line);
      border-radius: 8px;
      margin-bottom: 6px;
      background: rgba(255, 255, 255, 0.5);
      transition: box-shadow 120ms ease;
    }
    .skill-item:hover {
      box-shadow: var(--shadow-soft);
    }
    .skill-item input[type="checkbox"] {
      width: 18px;
      height: 18px;
      cursor: pointer;
      flex-shrink: 0;
    }
    .skill-item-info {
      flex: 1;
      min-width: 0;
    }
    .skill-item-name {
      font-weight: 600;
      font-size: 14px;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .skill-item-desc {
      font-size: 12px;
      color: var(--muted);
      margin-top: 2px;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .no-group-placeholder {
      text-align: center;
      padding: 40px;
      color: var(--muted);
    }
    .muted { color: var(--muted); font-size: 13px; }
    /* Toast */
    .toast-container {
      position: fixed;
      top: 20px;
      right: 20px;
      z-index: 9999;
      display: flex;
      flex-direction: column;
      gap: 10px;
      pointer-events: none;
    }
    .toast {
      pointer-events: auto;
      min-width: 280px;
      max-width: 460px;
      padding: 14px 20px;
      border-radius: var(--radius-sm);
      font-size: 14px;
      font-weight: 500;
      line-height: 1.6;
      color: var(--ink);
      border: 1px solid var(--line);
      background: var(--paper);
      box-shadow: var(--shadow);
      animation: toastIn 200ms ease;
    }
    .toast-success { border-left: 4px solid #6a8758; }
    .toast-error { border-left: 4px solid #9a4f40; }
    .toast-warning { border-left: 4px solid #b88a4a; }
    @keyframes toastIn {
      from { opacity: 0; transform: translateX(30px); }
      to { opacity: 1; transform: translateX(0); }
    }
    /* 确认框 */
    .confirm-overlay {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(45, 36, 28, 0.3);
      z-index: 200;
      justify-content: center;
      align-items: center;
    }
    .confirm-overlay.show {
      display: flex;
    }
    .confirm-box {
      background: var(--paper);
      border: 1px solid var(--line-strong);
      border-radius: var(--radius-xl);
      padding: 24px 32px;
      max-width: 400px;
      text-align: center;
    }
    .confirm-box h3 {
      margin: 0 0 12px;
      font-size: 18px;
    }
    .confirm-box p {
      color: var(--muted);
      margin: 0 0 20px;
    }
    .confirm-box .modal-actions {
      display: flex;
      gap: 12px;
      justify-content: center;
    }
  </style>
</head>
<body>
  <div class="groups-container">
    <div class="groups-header">
      <h1>分组管理</h1>
      <button class="btn btn-secondary" id="backBtn">返回</button>
    </div>

    <div class="groups-layout">
      <!-- 左侧：分组列表 -->
      <div class="groups-panel">
        <div class="groups-panel-header">
          <span class="panel-title">分组</span>
          <span class="muted" id="groupCount">0 个分组</span>
        </div>
        <div class="groups-panel-body" id="groupList">
          <!-- 分组列表 -->
        </div>
        <button class="btn btn-primary add-group-btn" id="addGroupBtn">+ 新建分组</button>
      </div>

      <!-- 右侧：Skill 列表 -->
      <div class="skills-panel">
        <div class="skills-panel-header">
          <span class="panel-title">分配 Skill 到分组</span>
          <input type="text" class="skills-search" id="skillSearch" placeholder="搜索 Skill...">
          <div class="batch-actions">
            <span class="muted" id="selectedCount">已选 0 个</span>
            <select id="targetGroupSelect" style="padding: 6px 10px; border: 1px solid var(--line-strong); border-radius: 8px; font-size: 13px; background: rgba(255,255,255,0.92);">
              <option value="">选择目标分组</option>
            </select>
            <button class="btn btn-primary" id="moveBtn" disabled>移动</button>
          </div>
        </div>
        <div class="skills-panel-body" id="skillList">
          <div class="no-group-placeholder">加载中...</div>
        </div>
      </div>
    </div>
  </div>

  <!-- Toast 容器 -->
  <div class="toast-container" id="toastContainer"></div>

  <!-- 确认删除弹窗 -->
  <div class="modal-overlay" id="confirmModal">
    <div class="confirm-box">
      <h3 id="confirmTitle">确认删除</h3>
      <p id="confirmMessage">确定要删除这个分组吗？</p>
      <div class="modal-actions">
        <button class="btn btn-secondary" id="confirmCancel">取消</button>
        <button class="btn btn-danger" id="confirmOk">删除</button>
      </div>
    </div>
  </div>

  <!-- 新建分组弹窗 -->
  <div class="modal-overlay" id="addGroupModal">
    <div class="modal" style="background: var(--paper); border: 1px solid var(--line-strong); border-radius: 16px; padding: 24px; min-width: 360px;">
      <h3 class="modal-title" style="margin: 0 0 16px; font-size: 18px;">新建分组</h3>
      <div class="form-group">
        <label style="display: block; margin-bottom: 6px; font-weight: 600; font-size: 14px;">分组名称</label>
        <input type="text" id="newGroupName" placeholder="例如：前端" style="width: 100%; padding: 10px 14px; border: 1px solid var(--line-strong); border-radius: 12px; font-size: 14px; outline: none; box-sizing: border-box;">
      </div>
      <div class="modal-actions" style="margin-top: 20px; justify-content: flex-end;">
        <button class="btn btn-secondary" id="cancelAddGroup">取消</button>
        <button class="btn btn-primary" id="saveAddGroup">创建</button>
      </div>
    </div>
  </div>

  <script src="core.js"></script>
  <script>
    let allGroups = [];
    let allSkills = [];
    let selectedSkills = new Set();
    let selectedGroupId = null;
    let collapsedGroups = new Set();
    let confirmCallback = null;

    const STORAGE_KEYS = {
      skillCentralPath: 'skillCentralPath',
      skillMonitoredProjects: 'skillMonitoredProjects',
      skillSelectedProject: 'skillSelectedProject',
    };

    function toast(message, type = 'info') {
      const container = document.getElementById('toastContainer');
      const el = document.createElement('div');
      el.className = `toast toast-${type}`;
      el.textContent = message;
      container.appendChild(el);
      setTimeout(() => el.remove(), 3000);
    }

    function escapeHtml(str) {
      if (!str) return '';
      return String(str)
        .replace(/&/g, '&amp;')
        .replace(/</g, '&lt;')
        .replace(/>/g, '&gt;')
        .replace(/"/g, '&quot;');
    }

    function loadStorage(key) {
      return new Promise((resolve) => {
        chrome.storage.local.get([key], (result) => resolve(result[key] || []));
      });
    }

    function sendNativeMessage(payload) {
      return new Promise((resolve, reject) => {
        chrome.runtime.sendMessage({ action: 'nativeMessage', payload }, (response) => {
          if (chrome.runtime.lastError) reject(new Error(chrome.runtime.lastError.message));
          else if (!response) reject(new Error('Native host 无响应'));
          else if (response.status === 'error') reject(new Error(response.message));
          else resolve(response);
        });
      });
    }

    // 加载数据
    async function loadData() {
      const centralPath = await loadStorage(STORAGE_KEYS.skillCentralPath);
      if (!centralPath) {
        document.getElementById('skillList').innerHTML = '<div class="no-group-placeholder">请先在设置中配置中心仓库路径</div>';
        return;
      }

      try {
        const [skillsResp, settingResp] = await Promise.all([
          sendNativeMessage({ command: 'scanSkills', path: centralPath }),
          sendNativeMessage({ command: 'readSetting', path: centralPath })
        ]);

        allSkills = skillsResp.data || [];
        const cfg = settingResp.data ? (typeof settingResp.data === 'string' ? JSON.parse(settingResp.data) : settingResp.data) : { groups: [] };
        allGroups = cfg.groups || [];
      } catch (e) {
        toast('加载失败: ' + e.message, 'error');
      }

      renderGroupList();
      renderSkillList();
      updateTargetGroupSelect();
    }

    // 渲染分组列表
    function renderGroupList() {
      const container = document.getElementById('groupList');
      document.getElementById('groupCount').textContent = `${allGroups.length} 个分组`;

      container.innerHTML = allGroups.map(g => `
        <div class="group-item ${g.id === selectedGroupId ? 'selected' : ''} ${g.id === 'ungrouped' ? 'ungrouped' : ''}" data-group-id="${g.id}">
          <div class="group-item-info">
            <div class="group-item-name">${escapeHtml(g.name)}</div>
            <div class="group-item-count">${g.skills?.length || 0} 个 Skill</div>
          </div>
          ${g.id !== 'ungrouped' ? `
            <div class="group-item-actions">
              <button class="group-delete-btn" data-action="delete-group" data-group-id="${g.id}" title="删除分组">×</button>
            </div>
          ` : ''}
        </div>
      `).join('');
    }

    // 渲染 Skill 列表（按分组折叠）
    function renderSkillList() {
      const container = document.getElementById('skillList');
      const search = document.getElementById('skillSearch').value.toLowerCase();

      // 按分组组织 skills
      const groupMap = new Map();
      allGroups.forEach(g => groupMap.set(g.id, { group: g, skills: [] }));
      groupMap.set('ungrouped', { group: { id: 'ungrouped', name: '未分组' }, skills: [] });

      allSkills.forEach(s => {
        const gid = s.groupId || 'ungrouped';
        if (groupMap.has(gid)) {
          groupMap.get(gid).skills.push(s);
        } else {
          groupMap.get('ungrouped').skills.push(s);
        }
      });

      // 过滤
      const filtered = [];
      groupMap.forEach(({ group, skills }) => {
        const filteredSkills = skills.filter(s =>
          !search || s.name.toLowerCase().includes(search) || (s.description || '').toLowerCase().includes(search)
        );
        if (filteredSkills.length > 0) {
          filtered.push({ group, skills: filteredSkills });
        }
      });

      if (filtered.length === 0) {
        container.innerHTML = '<div class="no-group-placeholder">没有找到匹配的 Skill</div>';
        return;
      }

      container.innerHTML = filtered.map(({ group, skills }) => {
        const isCollapsed = collapsedGroups.has(group.id);
        return `
          <div class="skill-group-section" data-group-id="${group.id}">
            <div class="skill-group-header" data-action="toggle-group" data-group-id="${group.id}">
              <span class="skill-group-toggle ${isCollapsed ? 'collapsed' : ''}">▼</span>
              <span class="skill-group-name">${escapeHtml(group.name)}</span>
              <span class="skill-group-count">${skills.length}</span>
            </div>
            <div class="skill-group-items ${isCollapsed ? 'hidden' : ''}">
              ${skills.map(s => `
                <div class="skill-item">
                  <input type="checkbox" data-skill-name="${escapeHtml(s.name)}" ${selectedSkills.has(s.name) ? 'checked' : ''}>
                  <div class="skill-item-info">
                    <div class="skill-item-name">${escapeHtml(s.name)}</div>
                    <div class="skill-item-desc">${escapeHtml(s.description || '(无描述)')}</div>
                  </div>
                </div>
              `).join('')}
            </div>
          </div>
        `;
      }).join('');
    }

    // 更新目标分组下拉
    function updateTargetGroupSelect() {
      const select = document.getElementById('targetGroupSelect');
      select.innerHTML = '<option value="">选择目标分组</option>' +
        allGroups.filter(g => g.id !== 'ungrouped').map(g =>
          `<option value="${g.id}">${escapeHtml(g.name)}</option>`
        ).join('');
    }

    // 更新选中计数
    function updateSelectedCount() {
      document.getElementById('selectedCount').textContent = `已选 ${selectedSkills.size} 个`;
      document.getElementById('moveBtn').disabled = selectedSkills.size === 0;
    }

    // 事件处理
    document.addEventListener('click', (e) => {
      const btn = e.target.closest('[data-action]');
      if (!btn) return;

      const action = btn.dataset.action;
      const groupId = btn.dataset.groupId;
      const skillName = btn.dataset.skillName;

      switch (action) {
        case 'toggle-group':
          if (collapsedGroups.has(groupId)) {
            collapsedGroups.delete(groupId);
          } else {
            collapsedGroups.add(groupId);
          }
          renderSkillList();
          break;

        case 'delete-group':
          const group = allGroups.find(g => g.id === groupId);
          if (group) {
            showConfirm(
              '确认删除分组',
              `确定要删除分组「${group.name}」吗？该分组下的 Skill 将移至「未分组」。`,
              async () => {
                await deleteGroup(groupId);
              }
            );
          }
          break;
      }
    });

    document.getElementById('groupList').addEventListener('click', (e) => {
      const item = e.target.closest('.group-item');
      if (!item || e.target.closest('[data-action]')) return;
      const groupId = item.dataset.groupId;
      selectedGroupId = groupId;
      renderGroupList();
    });

    document.getElementById('skillList').addEventListener('change', (e) => {
      if (e.target.type === 'checkbox') {
        const skillName = e.target.dataset.skillName;
        if (e.target.checked) {
          selectedSkills.add(skillName);
        } else {
          selectedSkills.delete(skillName);
        }
        updateSelectedCount();
      }
    });

    document.getElementById('skillSearch').addEventListener('input', () => {
      renderSkillList();
    });

    document.getElementById('moveBtn').addEventListener('click', async () => {
      const targetGroupId = document.getElementById('targetGroupSelect').value;
      if (!targetGroupId) {
        toast('请选择目标分组', 'warning');
        return;
      }
      if (selectedSkills.size === 0) {
        toast('请先选择 Skill', 'warning');
        return;
      }
      await moveSelectedSkills(targetGroupId);
    });

    document.getElementById('addGroupBtn').addEventListener('click', () => {
      document.getElementById('newGroupName').value = '';
      document.getElementById('addGroupModal').classList.add('show');
      document.getElementById('newGroupName').focus();
    });

    document.getElementById('cancelAddGroup').addEventListener('click', () => {
      document.getElementById('addGroupModal').classList.remove('show');
    });

    document.getElementById('saveAddGroup').addEventListener('click', async () => {
      const name = document.getElementById('newGroupName').value.trim();
      if (!name) {
        toast('请输入分组名称', 'error');
        return;
      }
      await addGroup(name);
      document.getElementById('addGroupModal').classList.remove('show');
    });

    document.getElementById('confirmCancel').addEventListener('click', () => {
      document.getElementById('confirmModal').classList.remove('show');
      confirmCallback = null;
    });

    document.getElementById('confirmOk').addEventListener('click', () => {
      document.getElementById('confirmModal').classList.remove('show');
      if (confirmCallback) confirmCallback();
      confirmCallback = null;
    });

    document.getElementById('backBtn').addEventListener('click', () => {
      window.location.href = 'index.html';
    });

    function showConfirm(title, message, callback) {
      document.getElementById('confirmTitle').textContent = title;
      document.getElementById('confirmMessage').textContent = message;
      confirmCallback = callback;
      document.getElementById('confirmModal').classList.add('show');
    }

    // API
    async function addGroup(name) {
      const centralPath = await loadStorage(STORAGE_KEYS.skillCentralPath);
      if (!centralPath) {
        toast('中心仓库路径未设置', 'error');
        return;
      }

      try {
        const newGroup = {
          id: Date.now().toString(36),
          name,
          skills: []
        };
        allGroups.push(newGroup);
        await sendNativeMessage({ command: 'saveSkillGroups', path: centralPath, groups: allGroups });
        toast(`已创建分组：${name}`);
        renderGroupList();
        renderSkillList();
        updateTargetGroupSelect();
      } catch (e) {
        toast('创建失败: ' + e.message, 'error');
      }
    }

    async function deleteGroup(groupId) {
      const centralPath = await loadStorage(STORAGE_KEYS.skillCentralPath);
      if (!centralPath) {
        toast('中心仓库路径未设置', 'error');
        return;
      }

      try {
        // 从所有分组中移除该分组，其 skills 自动回归 ungrouped
        const newGroups = allGroups.filter(g => g.id !== groupId);
        // 确保 ungrouped 存在
        if (!newGroups.find(g => g.id === 'ungrouped')) {
          newGroups.unshift({ id: 'ungrouped', name: '未分组' });
        }
        await sendNativeMessage({ command: 'saveSkillGroups', path: centralPath, groups: newGroups });
        allGroups = newGroups;
        if (selectedGroupId === groupId) selectedGroupId = null;
        toast('分组已删除');
        loadData();
      } catch (e) {
        toast('删除失败: ' + e.message, 'error');
      }
    }

    async function moveSelectedSkills(targetGroupId) {
      const centralPath = await loadStorage(STORAGE_KEYS.skillCentralPath);
      if (!centralPath) {
        toast('中心仓库路径未设置', 'error');
        return;
      }

      try {
        const groups = JSON.parse(JSON.stringify(allGroups));

        // 确保 ungrouped 存在
        if (!groups.find(g => g.id === 'ungrouped')) {
          groups.unshift({ id: 'ungrouped', name: '未分组' });
        }

        // 从所有分组中移除选中的 skills
        for (const g of groups) {
          g.skills = (g.skills || []).filter(s => !selectedSkills.has(s));
        }

        // 添加到目标分组
        const target = groups.find(g => g.id === targetGroupId);
        if (target) {
          if (!target.skills) target.skills = [];
          for (const name of selectedSkills) {
            if (!target.skills.includes(name)) {
              target.skills.push(name);
            }
          }
        }

        await sendNativeMessage({ command: 'saveSkillGroups', path: centralPath, groups });
        toast(`已移动 ${selectedSkills.size} 个 Skill`);
        selectedSkills.clear();
        updateSelectedCount();
        loadData();
      } catch (e) {
        toast('移动失败: ' + e.message, 'error');
      }
    }

    // 初始化
    loadData();
  </script>
</body>
</html>
