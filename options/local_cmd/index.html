<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>本地命令管理</title>
  <link rel="stylesheet" href="../options.css" />
  <style>
      .btn{
          min-height: 0;
      }
      .btn-add-cmd {
          margin-top: 50px;
          background: rgba(255, 255, 255, 0.03);
          width: 300px;
          height: 150px;
          border: 2px dashed rgba(107, 74, 49, 0.5);
          box-shadow: none;
          color: #1e1e1e;
          font-size: 20px;
          cursor: pointer;
          transition: border-color 0.3s ease,
          border-style 0s ease 0.3s,
          background-color 0.3s ease;
      }

      .btn-add-cmd:hover {
          border-style: solid;
          border-color: rgba(107, 74, 49, 0.8);
          background: rgba(107, 74, 49, 0.08);
      }
      .btn-pull {
          border-radius: 8px;
          /* 关键：一个 gradient 同时含「棕色」和「透明/浅色」两段 */
          background-image: linear-gradient(
                  to right,
                  rgba(107, 74, 49, 0.3) 0%,
                  rgba(107, 74, 49, 0.3) 50%,
                  transparent 50%,
                  transparent 100%
          );
          background-size: 200% 100%;
          background-position: 100% 0;   /* 初始：露出右半边（浅色） */
          background-color: transparent;
          box-shadow: none;
          color: #6b4a31;
          border: 1px solid rgba(107, 74, 49, 0.5);
          transition: background-position 0.4s ease, color 0.4s ease;
          cursor: pointer;
      }

      .btn-pull:hover {
          background-position: 0 0;      /* hover：滑到左半边（棕色） */
          color: #fff;                   /* 可选：文字也跟着变 */
      }
    .local-cmd-container {
      max-width: 1400px;
      margin: 0 auto;
      padding: 24px 20px 34px;
    }

    /* Tab 导航 */
    .tab-nav {
      display: flex;
      gap: 4px;
      margin-bottom: 22px;
      border-bottom: 2px solid var(--line);
      padding-bottom: 0;
    }

    .tab-btn {
      padding: 12px 24px;
      border: 1px solid transparent;
      border-bottom: none;
      border-radius: var(--radius-sm) var(--radius-sm) 0 0;
      background: transparent;
      color: var(--muted);
      font-size: 16px;
      font-weight: 600;
      cursor: pointer;
      transition: all 120ms ease;
    }

    .tab-btn:hover {
      color: var(--ink);
      background: rgba(255, 252, 247, 0.5);
    }

    .tab-btn.active {
      color: var(--ink);
      background: rgba(255, 252, 247, 0.9);
      border-color: var(--line);
    }

    .tab-panel {
      display: none;
    }

    .tab-panel.active {
      display: block;
    }


    /* 命令模板卡片 */
    .cmd-card {
      border: 1px solid var(--line);
      border-radius: var(--radius-md);
      background: rgba(255, 252, 247, 0.72);
      padding: 18px 20px;
      margin-bottom: 14px;
      transition: transform 120ms ease, box-shadow 120ms ease;
    }

    .cmd-card:hover {
      transform: translateY(-1px);
      box-shadow: var(--shadow-soft);
    }

    .cmd-card-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 10px;
    }

    .cmd-card-name {
      font-size: 18px;
      font-weight: 600;
      color: var(--ink);
    }

    .cmd-card-actions {
      display: flex;
      gap: 8px;
    }

    .cmd-card-detail {
      display: grid;
      grid-template-columns: auto 1fr;
      gap: 4px 14px;
      font-size: 14px;
      color: var(--muted);
      line-height: 1.7;
    }

    .cmd-card-detail dt {
      font-weight: 600;
      color: rgba(45, 36, 28, 0.7);
    }

    /* 运行中进程 */
    .process-card {
      border: 1px solid var(--line);
      border-radius: var(--radius-md);
      background: rgba(255, 252, 247, 0.72);
      padding: 16px 20px;
      margin-bottom: 12px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 16px;
    }

    .process-info {
      flex: 1;
    }

    .process-name {
      font-weight: 600;
      font-size: 16px;
      color: var(--ink);
    }

    .process-meta {
      font-size: 13px;
      color: var(--muted);
      margin-top: 4px;
      white-space: pre-line;
      word-break: break-all;
    }

    .status-badge {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      padding: 4px 12px;
      border-radius: 999px;
      font-size: 13px;
      font-weight: 600;
    }

    .status-badge.running {
      background: rgba(106, 135, 88, 0.15);
      color: #4c6740;
    }

    .status-badge.stopped {
      background: rgba(154, 79, 64, 0.12);
      color: #7a3025;
    }

    .status-dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
    }

    .status-dot.running {
      background: #6a8758;
    }

    .status-dot.stopped {
      background: #9a4f40;
    }

    /* Git 目录卡片 */
    .git-card {
      border: 1px solid var(--line);
      border-radius: var(--radius-md);
      background: rgba(255, 252, 247, 0.72);
      padding: 18px 20px;
      margin-bottom: 14px;
    }

    .git-card-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 10px;
    }

    .git-card-dir {
      font-size: 16px;
      font-weight: 600;
      color: var(--ink);
    }

    .git-card-actions {
      display: flex;
      gap: 8px;
    }

    .git-status-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(120px, 1fr));
      gap: 12px;
      margin-top: 10px;
    }

    .git-stat {
      text-align: center;
      padding: 10px;
      border: 1px solid var(--line);
      border-radius: var(--radius-sm);
      background: rgba(255, 255, 255, 0.5);
    }

    .git-stat-value {
      font-size: 24px;
      font-weight: 700;
      color: var(--ink);
    }

    .git-stat-label {
      font-size: 13px;
      color: var(--muted);
      margin-top: 4px;
    }

    .git-stat-value.clean { color: #6a8758; }
    .git-stat-value.dirty { color: #9a4f40; }

    /* 弹窗 */
    .modal-overlay {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(45, 36, 28, 0.3);
      z-index: 100;
      justify-content: center;
      align-items: center;
    }

    .modal-overlay.show {
      display: flex;
    }

    .modal {
      background: var(--paper);
      border: 1px solid var(--line-strong);
      border-radius: var(--radius-xl);
      padding: 32px;
      min-width: 480px;
      max-width: 560px;
      box-shadow: var(--shadow);
    }

    .modal-title {
      font-size: 24px;
      font-weight: 600;
      margin-bottom: 20px;
    }

    .modal .form-group {
      margin-bottom: 16px;
    }

    .modal .form-group label {
      display: block;
      margin-bottom: 6px;
      font-weight: 600;
      font-size: 14px;
      color: rgba(45, 36, 28, 0.84);
    }

    .modal .form-group input,
    .modal .form-group textarea {
      width: 100%;
      padding: 10px 14px;
      border: 1px solid var(--line-strong);
      border-radius: 16px;
      background: rgba(255, 255, 255, 0.92);
      font-size: 15px;
      outline: none;
      transition: border-color 120ms ease;
    }

    .modal .form-group input:focus,
    .modal .form-group textarea:focus {
      border-color: rgba(107, 74, 49, 0.34);
    }

    .modal-actions {
      display: flex;
      gap: 12px;
      justify-content: flex-end;
      margin-top: 20px;
    }

    .empty-state {
      text-align: center;
      padding: 40px 20px;
      color: var(--muted);
    }

    .empty-state p {
      font-size: 16px;
      margin-bottom: 16px;
    }

    .batch-bar {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 14px 18px;
      margin-bottom: 16px;
      border: 1px solid var(--line);
      border-radius: var(--radius-md);
      background: rgba(255, 252, 247, 0.72);
    }

    .batch-bar .section-title {
      font-size: 16px;
      margin: 0;
    }

    .toolbar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 18px;
    }

    .native-status {
      display: flex;
      align-items: center;
      gap: 8px;
      font-size: 14px;
      color: var(--muted);
    }

    /* Toast 提示 */
    .toast-container {
      position: fixed;
      top: 20px;
      right: 20px;
      z-index: 9999;
      display: flex;
      flex-direction: column;
      gap: 10px;
      pointer-events: none;
    }

    .toast {
      pointer-events: auto;
      min-width: 280px;
      max-width: 460px;
      padding: 14px 20px;
      border-radius: var(--radius-sm);
      font-size: 14px;
      font-weight: 500;
      line-height: 1.6;
      color: var(--ink);
      border: 1px solid var(--line);
      background: var(--paper);
      box-shadow: var(--shadow);
      animation: toastIn 200ms ease;
      transition: opacity 200ms ease, transform 200ms ease;
      white-space: pre-line;
    }

    .toast.hiding {
      opacity: 0;
      transform: translateX(20px);
    }

    .toast-success { border-left: 4px solid #6a8758; }
    .toast-error   { border-left: 4px solid #9a4f40; }
    .toast-warning { border-left: 4px solid #b88a4a; }
    .toast-info    { border-left: 4px solid #5a7ea0; }

    .toast-title {
      font-weight: 700;
      margin-bottom: 4px;
    }

    .toast-body {
      font-weight: 400;
      font-size: 13px;
      color: var(--muted);
    }

    @keyframes toastIn {
      from { opacity: 0; transform: translateX(30px); }
      to   { opacity: 1; transform: translateX(0); }
    }

    /* 确认态按钮 */
    .btn-confirm-pending {
      background: rgba(154, 79, 64, 0.2) !important;
      color: #9a4f40 !important;
      border-color: rgba(154, 79, 64, 0.3) !important;
      animation: confirmPulse 600ms ease infinite alternate;
    }

    @keyframes confirmPulse {
      from { opacity: 0.8; }
      to   { opacity: 1; }
    }

    /* Skill 管理面板 */
    .skill-config-bar {
      padding: 14px 18px;
      margin-bottom: 16px;
      border: 1px solid var(--line);
      border-radius: var(--radius-md);
      background: rgba(255, 252, 247, 0.72);
      display: flex;
      flex-direction: column;
      gap: 10px;
    }

    .skill-config-bar .config-row {
      display: flex;
      align-items: center;
      gap: 10px;
      flex-wrap: wrap;
    }

    .skill-config-bar .config-row label {
      font-weight: 600;
      font-size: 14px;
      color: rgba(45, 36, 28, 0.84);
      min-width: 100px;
    }

    .skill-config-bar .config-row input {
      flex: 1;
      min-width: 200px;
      padding: 8px 12px;
      border: 1px solid var(--line-strong);
      border-radius: 12px;
      font-size: 14px;
      background: rgba(255, 255, 255, 0.92);
      outline: none;
    }

    .skill-config-bar .config-row input:focus {
      border-color: rgba(107, 74, 49, 0.34);
    }

    .muted {
      color: var(--muted);
      font-size: 14px;
    }

    /* Skill 管理 - 左右分栏 */
    .skill-layout {
      display: flex;
      gap: 16px;
      min-height: calc(100vh - 160px);
    }

    .skill-panel {
      flex: 1;
      background: rgba(255, 252, 247, 0.72);
      border: 1px solid var(--line);
      border-radius: var(--radius-md);
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    .skill-panel-header {
      padding: 12px 16px;
      background: var(--paper);
      border-bottom: 1px solid var(--line);
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 10px;
      flex-shrink: 0;
        box-sizing: border-box;
        height: 50px;
    }

    .skill-panel-header .panel-title {
      font-weight: 600;
      font-size: 14px;
      color: var(--ink);
    }

    .skill-panel-header select {
      padding: 6px 10px;
      border: 1px solid var(--line-strong);
      border-radius: 8px;
      font-size: 13px;
      background: rgba(255, 255, 255, 0.92);
      color: var(--ink);
      max-width: 240px;
    }

    .skill-panel-body {
      flex: 1;
      overflow-y: auto;
      padding: 12px;
    }

    .skill-card {
      border: 1px solid var(--line);
      border-radius: var(--radius-md);
      background: rgba(255, 252, 247, 0.72);
      padding: 14px 16px;
      margin-bottom: 8px;
      transition: box-shadow 120ms ease;
    }

    .skill-card:hover {
      box-shadow: var(--shadow-soft);
    }

    .skill-card-header {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      margin-bottom: 8px;
      gap: 12px;
    }

    .skill-card-title {
      font-weight: 600;
      font-size: 16px;
      color: var(--ink);
    }

    .skill-card-tags {
      display: flex;
      gap: 6px;
      flex-shrink: 0;
    }

    .source-tag {
      display: inline-block;
      padding: 2px 10px;
      border-radius: 10px;
      font-size: 12px;
      font-weight: 500;
    }

    .source-tag.central {
      background: rgba(107, 74, 49, 0.12);
      color: #7a3025;
    }

    .source-tag.local {
      background: rgba(106, 135, 88, 0.15);
      color: #4c6740;
    }

    .source-tag.both {
      background: rgba(107, 135, 160, 0.15);
      color: #3a5f7a;
    }

    .source-tag.synced {
      background: rgba(106, 135, 88, 0.15);
      color: #4c6740;
    }

    .source-tag.conflict {
      background: rgba(184, 138, 74, 0.15);
      color: #8a6428;
    }

    .skill-card-desc {
      font-size: 13px;
      color: var(--muted);
      margin-bottom: 8px;
      line-height: 1.5;
    }

    .skill-card-path {
      font-size: 12px;
      color: var(--muted);
      margin-bottom: 10px;
      word-break: break-all;
    }

    .skill-card-actions {
      display: flex;
      gap: 6px;
      flex-wrap: wrap;
    }

    .skill-empty {
      text-align: center;
      padding: 60px 20px;
      color: var(--muted);
    }

    .skill-empty p {
      font-size: 15px;
      margin-bottom: 12px;
    }

    .skill-loading {
      display: flex;
      justify-content: center;
      padding: 40px;
    }

    .native-status-bar {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-bottom: 16px;
      font-size: 13px;
      color: var(--muted);
    }
  </style>
</head>
<body>
  <div class="local-cmd-container page-container">
    <div class="native-status-bar">
      <span class="status-dot" id="nativeDot"></span>
      <span id="nativeStatus">检测中...</span>
    </div>

    <!-- Tab 导航 -->
    <nav class="tab-nav">
      <button class="tab-btn active" data-tab="git">Git 监控</button>
      <button class="tab-btn" data-tab="skills">Skill 管理</button>
      <button class="tab-btn" data-tab="commands">命令管理</button>
      <button class="tab-btn" data-tab="processes">运行中进程</button>
    </nav>

    <!-- Git 监控 Tab -->
    <div class="tab-panel active" id="panel-git">
      <div class="toolbar">
        <h2 class="section-title">监控目录</h2>
        <button class="btn btn-primary" data-action="add-git-dir">+ 添加目录</button>
      </div>
      <div class="batch-bar">
        <span class="section-title">批量操作</span>
        <button class="btn btn-warning" data-action="git-batch-push">全部 Push</button>
        <button class="btn btn-success" data-action="git-batch-pull">全部 Pull</button>
        <button class="btn btn-secondary" data-action="git-batch-refresh">刷新状态</button>
      </div>
      <div id="gitList"></div>
    </div>

    <!-- Skill 管理 Tab -->
    <div class="tab-panel" id="panel-skills">
      <!-- 配置区 -->
      <div class="skill-config-bar">
        <div class="config-row">
          <label>中心仓库：</label>
          <input type="text" id="skillCentralPath" placeholder="例如：D:\a_other\md\sl">
          <button class="btn btn-secondary" data-action="skill-save-central">保存</button>
        </div>
      </div>

      <!-- 左右分栏 -->
      <div class="skill-layout">
        <!-- 左侧：中心仓库 -->
        <div class="skill-panel">
          <div class="skill-panel-header">
            <span class="panel-title">中心仓库</span>
            <span class="muted" id="centralCount">0 个 Skill</span>
          </div>
          <div class="skill-panel-body" id="centralSkillList">
            <div class="skill-loading"><div class="spinner"></div></div>
          </div>
        </div>

        <!-- 右侧：项目 -->
        <div class="skill-panel">
          <div class="skill-panel-header">
            <span class="panel-title">项目</span>
            <select id="skillProjectSelect">
              <option value="">-- 选择项目 --</option>
            </select>
            <button class="btn btn-secondary" style="padding: 4px 10px; font-size: 12px;" data-action="skill-add-project">+ 添加</button>
            <button class="btn btn-secondary" style="padding: 4px 10px; font-size: 12px;" data-action="skill-import-from-git">从 Git 导入</button>
          </div>
          <div class="skill-panel-body" id="projectSkillList">
            <div class="skill-empty"><p>从左侧选择一个 Skill 进行操作</p></div>
          </div>
        </div>
      </div>
    </div>

    <!-- 命令管理 Tab -->
    <div class="tab-panel" id="panel-commands">
      <div class="toolbar">
        <h2 class="section-title">命令模板</h2>
        <button class="btn btn-primary" data-action="add-cmd">+ 新增命令</button>
      </div>
      <div id="cmdList"></div>
    </div>

    <!-- 运行中进程 Tab -->
    <div class="tab-panel" id="panel-processes">
      <div class="toolbar">
        <h2 class="section-title">运行中进程</h2>
        <button class="btn btn-secondary" data-action="refresh-processes">刷新</button>
      </div>
      <div id="processList"></div>
    </div>
  </div>

  <!-- 新增/编辑命令弹窗 -->
  <div class="modal-overlay" id="cmdModal">
    <div class="modal">
      <h3 class="modal-title" id="cmdModalTitle">新增命令</h3>
      <div class="form-group">
        <label>名称</label>
        <input type="text" id="cmdName" placeholder="例如：启动前端开发服务器" />
      </div>
      <div class="form-group">
        <label>工作目录</label>
        <input type="text" id="cmdWorkDir" placeholder="例如：D:\projects\myapp" />
      </div>
      <div class="form-group">
        <label>命令</label>
        <input type="text" id="cmdCmd" placeholder="例如：npm" />
      </div>
      <div class="form-group">
        <label>参数（空格分隔）</label>
        <input type="text" id="cmdArgs" placeholder="例如：run dev" />
      </div>
      <div class="modal-actions">
        <button class="btn btn-secondary" data-action="cmd-cancel">取消</button>
        <button class="btn btn-primary" data-action="cmd-save">保存</button>
      </div>
    </div>
  </div>

  <!-- 添加 Git 目录弹窗 -->
  <div class="modal-overlay" id="gitDirModal">
    <div class="modal">
      <h3 class="modal-title">添加 Git 目录</h3>
      <div class="form-group">
        <label>目录名称</label>
        <input type="text" id="gitDirName" placeholder="例如：主项目" />
      </div>
      <div class="form-group">
        <label>目录路径</label>
        <input type="text" id="gitDirPath" placeholder="例如：D:\projects\myapp" />
      </div>
      <div class="modal-actions">
        <button class="btn btn-secondary" data-action="gitdir-cancel">取消</button>
        <button class="btn btn-primary" data-action="gitdir-save">保存</button>
      </div>
    </div>
  </div>

  <!-- 添加 Skill 项目目录弹窗 -->
  <div class="modal-overlay" id="skillProjectModal">
    <div class="modal">
      <h3 class="modal-title">添加 Skill 项目</h3>
      <div class="form-group">
        <label>项目名称</label>
        <input type="text" id="skillProjectName" placeholder="例如：主项目" />
      </div>
      <div class="form-group">
        <label>目录路径</label>
        <input type="text" id="skillProjectPath" placeholder="例如：D:\projects\myapp" />
      </div>
      <div class="modal-actions">
        <button class="btn btn-secondary" data-action="skill-project-cancel">取消</button>
        <button class="btn btn-primary" data-action="skill-project-save">保存</button>
      </div>
    </div>
  </div>

  <!-- Toast 容器 -->
  <div class="toast-container" id="toastContainer"></div>

  <script src="core.js"></script>
  <script src="command.js"></script>
  <script src="git.js"></script>
  <script src="skill.js"></script>
  <script src="local_cmd.js"></script>
  <script type="module" src="../focusScroll/init.js"></script>
</body>
</html>
