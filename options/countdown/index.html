<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>倒计时面板</title>
    <link rel="stylesheet" href="countdown.css">
    <script src="https://cdn.jsdelivr.net/npm/sortablejs@1.15.0/Sortable.min.js"></script>
</head>
<body>
    <div class="countdown-container">
        <!-- 头部 -->
        <header class="countdown-header">
            <div class="header-left">
                <h1 class="countdown-title">
                    <span class="countdown-title-icon" aria-hidden="true">
                        <svg viewBox="0 0 24 24" width="50" height="40" fill="none" xmlns="http://www.w3.org/2000/svg">
                          <path d="M8 2h8" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
                          <path d="M12 8v5l3 2" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
                          <circle cx="12" cy="13" r="7" stroke="currentColor" stroke-width="2"/>
                          <path d="M7 6 4.5 4.5" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
                          <path d="M17 6 19.5 4.5" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
                          <path d="M8.5 20.5 7 22" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
                          <path d="M15.5 20.5 17 22" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
                        </svg>
                    </span>
                    倒计时面板
                </h1>
                <span class="count-stat" id="countStat">0 / 8</span>
            </div>
            <div class="header-right">
                <button class="btn btn-secondary" id="historyBtn">
                    流水表
                </button>
                <button class="btn btn-primary" id="addBtn">
                    新建倒计时
                </button>
            </div>
        </header>

        <!-- 倒计时网格 -->
        <div class="countdown-grid" id="countdownGrid">
            <!-- 倒计时卡片将通过 JavaScript 动态生成 -->
        </div>

        <!-- 空状态 -->
        <div class="empty-state" id="emptyState">
            <h2>还没有倒计时</h2>
            <p>点击"新建倒计时"创建您的第一个倒计时</p>
        </div>
    </div>

    <!-- 编辑/新建弹窗 -->
    <div class="modal-overlay" id="editModal">
        <div class="modal">
            <div class="modal-header">
                <h2 id="modalTitle">新建倒计时</h2>
                <button class="modal-close" id="modalClose">×</button>
            </div>
            <div class="modal-body">
                <div class="form-group">
                    <label for="timerName">倒计时名称 *</label>
                    <input type="text" id="timerName" class="form-input" placeholder="例如：番茄钟、休息时间...">
                </div>
                <div class="form-group">
                    <label for="timerDesc">描述</label>
                    <textarea id="timerDesc" class="form-textarea" placeholder="添加一些备注..."></textarea>
                </div>
                <div class="form-group">
                    <label>时长 * <span class="wheel-hint">可用滚轮调整，按住 Shift 调整秒</span></label>
                    <div class="duration-inputs">
                        <div class="duration-input-group">
                            <input type="number" id="timerDurationMinutes" class="form-input wheel-input" min="0" value="25" placeholder="分">
                            <span class="duration-unit">分</span>
                        </div>
                        <div class="duration-input-group">
                            <input type="number" id="timerDurationSeconds" class="form-input wheel-input" min="0" max="59" value="0" placeholder="秒">
                            <span class="duration-unit">秒</span>
                        </div>
                    </div>
                </div>
                <div class="form-group">
                    <label>主题色</label>
                    <div class="color-picker" id="colorPicker">
                        <button class="color-btn active" data-color="#99673f" style="background: #99673f"></button>
                        <button class="color-btn" data-color="#ef4444" style="background: #ef4444"></button>
                        <button class="color-btn" data-color="#22c55e" style="background: #22c55e"></button>
                        <button class="color-btn" data-color="#f59e0b" style="background: #f59e0b"></button>
                        <button class="color-btn" data-color="#8b5cf6" style="background: #8b5cf6"></button>
                        <button class="color-btn" data-color="#ec4899" style="background: #ec4899"></button>
                        <button class="color-btn" data-color="#06b6d4" style="background: #06b6d4"></button>
                        <button class="color-btn" data-color="#6366f1" style="background: #6366f1"></button>
                        <button class="color-btn" data-color="#14b8a6" style="background: #14b8a6"></button>
                        <button class="color-btn" data-color="#f97316" style="background: #f97316"></button>
                    </div>
                </div>
            </div>
            <div class="modal-footer">
                <button class="btn btn-secondary" id="modalCancel">取消</button>
                <button class="btn btn-primary" id="modalSave">保存</button>
            </div>
        </div>
    </div>

    <!-- 删除确认弹窗 -->
    <div class="modal-overlay" id="deleteModal">
        <div class="modal modal-small">
            <div class="modal-header">
                <h2>确认删除</h2>
                <button class="modal-close" id="deleteModalClose">×</button>
            </div>
            <div class="modal-body">
                <p>确定要删除这个倒计时吗？</p>
                <p class="delete-warning">相关的流水记录将被保留</p>
            </div>
            <div class="modal-footer">
                <button class="btn btn-secondary" id="deleteModalCancel">取消</button>
                <button class="btn btn-danger" id="deleteModalConfirm">删除</button>
            </div>
        </div>
    </div>

    <script type="module">
      import { initFocusScrollAgent } from '../focusScroll/iframeScrollAgent.js';
      import './countdown.js';
      initFocusScrollAgent();
    </script>
</body>
</html>
