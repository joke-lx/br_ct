<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>倒计时流水表</title>
    <link rel="stylesheet" href="history.css">
</head>
<body>
    <div class="history-container">
        <!-- 头部 -->
        <header class="history-header">
            <div class="header-left">
                <h1>📊 倒计时流水表</h1>
                <span class="record-count" id="recordCount">0 条记录</span>
            </div>
            <div class="header-right">
                <button class="btn btn-secondary" id="exportBtn">
                    <span>📤</span> 导出
                </button>
                <button class="btn btn-secondary" id="clearBtn">
                    <span>🗑️</span> 清空记录
                </button>
                <button class="btn btn-primary" id="backBtn">
                    <span>⬅️</span> 返回面板
                </button>
            </div>
        </header>

        <!-- 统计卡片 -->
        <div class="stats-row">
            <div class="stat-card">
                <div class="stat-icon">⏱️</div>
                <div class="stat-info">
                    <div class="stat-label">总完成次数</div>
                    <div class="stat-value" id="totalCompletions">0</div>
                </div>
            </div>
            <div class="stat-card">
                <div class="stat-icon">⏰</div>
                <div class="stat-info">
                    <div class="stat-label">总耗时</div>
                    <div class="stat-value" id="totalTime">0小时</div>
                </div>
            </div>
            <div class="stat-card">
                <div class="stat-icon">📈</div>
                <div class="stat-info">
                    <div class="stat-label">今日完成</div>
                    <div class="stat-value" id="todayCompletions">0</div>
                </div>
            </div>
            <div class="stat-card">
                <div class="stat-icon">🎯</div>
                <div class="stat-info">
                    <div class="stat-label">平均时长</div>
                    <div class="stat-value" id="avgTime">0分钟</div>
                </div>
            </div>
        </div>

        <!-- 筛选栏 -->
        <div class="filter-bar">
            <div class="filter-group">
                <label>搜索:</label>
                <input type="text" id="searchInput" class="filter-input" placeholder="搜索倒计时名称...">
            </div>
            <div class="filter-group">
                <label>日期:</label>
                <select id="dateFilter" class="filter-select">
                    <option value="all">全部</option>
                    <option value="today">今天</option>
                    <option value="yesterday">昨天</option>
                    <option value="week">最近7天</option>
                    <option value="month">最近30天</option>
                </select>
            </div>
        </div>

        <!-- 记录列表 -->
        <div class="history-list" id="historyList">
            <!-- 记录项将通过 JavaScript 动态生成 -->
        </div>

        <!-- 空状态 -->
        <div class="empty-state" id="emptyState">
            <div class="empty-icon">📊</div>
            <h2>还没有流水记录</h2>
            <p>完成倒计时后，记录将显示在这里</p>
        </div>
    </div>

    <!-- 克隆弹窗 -->
    <div class="modal-overlay" id="cloneModal">
        <div class="modal">
            <div class="modal-header">
                <h2>快速克隆创建新时钟</h2>
                <button class="modal-close" id="cloneModalClose">×</button>
            </div>
            <div class="modal-body">
                <div class="clone-info">
                    <div class="clone-info-item">
                        <span class="clone-label">原倒计时:</span>
                        <span class="clone-value" id="cloneOriginalName"></span>
                    </div>
                    <div class="clone-info-item">
                        <span class="clone-label">时长:</span>
                        <span class="clone-value" id="cloneOriginalDuration"></span>
                    </div>
                </div>
                <div class="form-group">
                    <label for="cloneName">新倒计时名称</label>
                    <input type="text" id="cloneName" class="form-input" placeholder="自动填充">
                </div>
                <div class="form-group">
                    <label for="cloneDesc">描述</label>
                    <textarea id="cloneDesc" class="form-textarea" placeholder="添加一些备注..."></textarea>
                </div>
            </div>
            <div class="modal-footer">
                <button class="btn btn-secondary" id="cloneModalCancel">取消</button>
                <button class="btn btn-primary" id="cloneModalConfirm">创建</button>
            </div>
        </div>
    </div>

    <!-- 删除确认弹窗 -->
    <div class="modal-overlay" id="deleteRecordModal">
        <div class="modal modal-small">
            <div class="modal-header">
                <h2>确认删除</h2>
                <button class="modal-close" id="deleteRecordModalClose">×</button>
            </div>
            <div class="modal-body">
                <p>确定要删除这条记录吗？</p>
            </div>
            <div class="modal-footer">
                <button class="btn btn-secondary" id="deleteRecordModalCancel">取消</button>
                <button class="btn btn-danger" id="deleteRecordModalConfirm">删除</button>
            </div>
        </div>
    </div>

    <script src="history.js"></script>
</body>
</html>
