<!DOCTYPE html>

  <head>

    <title>Options </title>
    <link rel="stylesheet" href="options.css" />

  <body>

              <span class="collapse-icon">◀</span>
            </button>
            <button class="focus-btn" id="focus-btn" title="专注模式">
              <span class="focus-icon">◎</span>
            </button>
          </div>
        </div>

        <nav class="sidebar-nav">
          <div class="nav-item active" data-page="platform/index.html">
            <span class="nav-icon">PL</span>
            <span>平台显示</span>
          </div>
          <div class="nav-item" data-page="api/index.html">
            <span class="nav-icon">API</span>
            <span>API 配置</span>
          </div>
          <div class="nav-item" data-page="storage/index.html">
            <span class="nav-icon">DB</span>
            <span>存储管理</span>
          </div>
          <div class="nav-item" data-page="menu/index.html">
            <span class="nav-icon">MN</span>
            <span>菜单配置</span>
          </div>
          <div class="nav-item" data-page="notes/index.html">
            <span class="nav-icon">NT</span>
            <span>随手笔记</span>
          </div>
          <div class="nav-item" data-page="ocr/index.html">
            <span class="nav-icon">OC</span>

          </div>
          <div class="nav-item" data-page="countdown/index.html">
            <span class="nav-icon">TM</span>
            <span>倒计时面板</span>
          </div>
          <div class="nav-item" data-page="prompts_editor/prompts_editor.html">
            <span class="nav-icon">PR</span>
            <span>提示词编辑</span>
          </div>
          <div class="nav-item" data-page="local_cmd/index.html">
            <span class="nav-icon">CMD</span>
            <span>本地命令管理</span>
          </div>
        </nav>
        <div class="sidebar-footer">
          <p> options</p>
        </div>
      </aside>

      <main class="main-content">
        <iframe id="content-frame" class="options-frame current-frame" src="platform/index.html" title="Options Content"></iframe>
        <iframe id="incoming-frame" class="options-frame incoming-frame" title="Options Incoming" aria-hidden="true"></iframe>
      </main>
    </div>

    <script src="options.js"></script>

    <!-- 悬浮点导航 -->
    <div class="dot-nav" id="dot-nav">
      <div class="dot-nav-dots" id="dot-nav-dots">

        <span class="dot"></span>
        <span class="dot"></span>
        <span class="dot"></span>
        <span class="dot"></span>
        <span class="dot"></span>
        <span class="dot"></span>
      </div>
      <div class="dot-nav-items" id="dot-nav-items">
        <!-- 导航项通过 JS 动态创建 -->
      </div>
    </div>
