<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>随手记管理</title>
    <link rel="stylesheet" href="notes.css">
</head>
<body>
    <div class="notes-container">
        <!-- 头部 -->
        <header class="notes-header">
            <div class="header-left">
                <h1>📝 随手记</h1>
                <span class="notes-count" id="notesCount">0 条笔记</span>
            </div>
            <div class="header-right">
                <button class="btn btn-secondary" id="exportBtn">
                    <span>📤</span> 导出
                </button>
                <button class="btn btn-primary" id="addBtn">
                    <span>➕</span> 新建笔记
                </button>
            </div>
        </header>

        <!-- 笔记列表 -->
        <div class="notes-list" id="notesList">
            <!-- 笔记项将通过 JavaScript 动态生成 -->
        </div>

        <!-- 空状态 -->
        <div class="empty-state" id="emptyState">
            <div class="empty-icon">📝</div>
            <h2>还没有笔记</h2>
            <p>点击"新建笔记"或使用三击空格键快速添加</p>
        </div>
    </div>

    <!-- 编辑弹窗 -->
    <div class="modal-overlay" id="editModal">
        <div class="modal">
            <div class="modal-header">
                <h2 id="modalTitle">编辑笔记</h2>
                <button class="modal-close" id="modalClose">×</button>
            </div>
            <div class="modal-body">
                <div class="form-group">
                    <label>笔记内容</label>
                    <div class="editor-container">
                        <div class="editor-toolbar">
                            <button class="toolbar-btn" data-action="insert-placeholder" title="插入占位符">
                                <span class="placeholder-icon"></span>
                            </button>
                            <span class="toolbar-hint">输入 "00" 自动转换为占位符，保存时变为 %s</span>
                        </div>
                        <div class="editor-content" id="editorContent" contenteditable="true"></div>
                    </div>
                </div>
                <div class="form-group">
                    <label>预览（保存格式）</label>
                    <div class="preview-box" id="previewBox"></div>
                </div>
            </div>
            <div class="modal-footer">
                <button class="btn btn-secondary" id="modalCancel">取消</button>
                <button class="btn btn-primary" id="modalSave">保存</button>
            </div>
        </div>
    </div>

    <script src="notes.js"></script>
</body>
</html>
