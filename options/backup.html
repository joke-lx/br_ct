<!DOCTYPE html>
<html>
  <head>
    <meta charset="UTF-8" />
    <title>备份设置</title>
    <link rel="stylesheet" href="options.css" />
    <style>
      .backup-status-card {
        background: linear-gradient(135deg, #e3f2fd 0%, #bbdefb 100%);
        border-radius: 12px;
        padding: 24px;
        margin-bottom: 24px;
      }

      .backup-status-header {
        display: flex;
        align-items: center;
        justify-content: space-between;
        margin-bottom: 16px;
      }

      .backup-status-title {
        font-size: 20px;
        font-weight: 600;
        color: #1565c0;
      }

      .backup-status-time {
        font-size: 14px;
        color: #1976d2;
      }

      .backup-status-time.never {
        color: #ef5350;
        font-style: italic;
      }

      .backup-stats {
        display: flex;
        gap: 24px;
        margin-top: 16px;
      }

      .backup-stat-item {
        flex: 1;
        background: rgba(255, 255, 255, 0.6);
        border-radius: 8px;
        padding: 16px;
        text-align: center;
      }

      .backup-stat-value {
        font-size: 24px;
        font-weight: 600;
        color: #1565c0;
      }

      .backup-stat-label {
        font-size: 12px;
        color: #1976d2;
        margin-top: 4px;
      }

      .setting-row {
        display: flex;
        align-items: center;
        justify-content: space-between;
        padding: 16px 0;
        border-bottom: 1px solid #f0f0f0;
      }

      .setting-row:last-child {
        border-bottom: none;
      }

      .setting-label {
        flex: 1;
      }

      .setting-title {
        font-weight: 500;
        color: #333;
        margin-bottom: 4px;
      }

      .setting-description {
        font-size: 13px;
        color: #666;
      }

      .setting-control {
        display: flex;
        align-items: center;
        gap: 12px;
      }

      /* 开关样式 */
      .toggle-switch {
        position: relative;
        width: 48px;
        height: 26px;
      }

      .toggle-switch input {
        opacity: 0;
        width: 0;
        height: 0;
      }

      .toggle-slider {
        position: absolute;
        cursor: pointer;
        top: 0;
        left: 0;
        right: 0;
        bottom: 0;
        background-color: #ccc;
        transition: 0.3s;
        border-radius: 26px;
      }

      .toggle-slider:before {
        position: absolute;
        content: "";
        height: 20px;
        width: 20px;
        left: 3px;
        bottom: 3px;
        background-color: white;
        transition: 0.3s;
        border-radius: 50%;
      }

      .toggle-switch input:checked + .toggle-slider {
        background-color: #3b82f6;
      }

      .toggle-switch input:checked + .toggle-slider:before {
        transform: translateX(22px);
      }

      /* 选择框样式 */
      .setting-select {
        padding: 8px 12px;
        border: 1px solid #ddd;
        border-radius: 6px;
        font-size: 14px;
        background: white;
        cursor: pointer;
        min-width: 120px;
      }

      .setting-select:focus {
        outline: none;
        border-color: #3b82f6;
      }

      .setting-select[type="text"] {
        min-width: 200px;
      }

      /* 备份历史列表 */
      .backup-history {
        margin-top: 16px;
      }

      .backup-history-item {
        display: flex;
        align-items: center;
        justify-content: space-between;
        padding: 12px;
        background: #f8f9fa;
        border-radius: 8px;
        margin-bottom: 8px;
      }

      .backup-history-info {
        flex: 1;
      }

      .backup-history-name {
        font-weight: 500;
        color: #333;
        font-size: 14px;
      }

      .backup-history-time {
        font-size: 12px;
        color: #666;
      }

      .backup-history-size {
        font-size: 13px;
        color: #6c757d;
      }

      .empty-history {
        text-align: center;
        padding: 40px 20px;
        color: #6c757d;
      }
    </style>
  </head>
  <body>
    <div class="page-container">
      <header class="page-header">
        <h1 class="page-title">💾 备份设置</h1>
        <p class="page-description">
          配置自动备份和手动备份功能，保护您的数据安全
        </p>
      </header>

      <!-- 备份状态卡片 -->
      <section class="section">
        <div class="backup-status-card">
          <div class="backup-status-header">
            <div class="backup-status-title">备份状态</div>
            <button class="btn btn-primary" id="backup-now-btn">📥 立即备份</button>
          </div>
          <div class="backup-status-time" id="last-backup-time">加载中...</div>
          <div class="backup-stats">
            <div class="backup-stat-item">
              <div class="backup-stat-value" id="total-backups-count">-</div>
              <div class="backup-stat-label">总备份次数</div>
            </div>
            <div class="backup-stat-item">
              <div class="backup-stat-value" id="storage-size-count">-</div>
              <div class="backup-stat-label">存储数据量</div>
            </div>
            <div class="backup-stat-item">
              <div class="backup-stat-value" id="next-backup-count">-</div>
              <div class="backup-stat-label">下次备份</div>
            </div>
          </div>
        </div>
      </section>

      <!-- 自动备份设置 -->
      <section class="section">
        <h2 class="section-title">⚙️ 自动备份设置</h2>

        <div class="setting-row">
          <div class="setting-label">
            <div class="setting-title">启用自动备份</div>
            <div class="setting-description">定期自动备份您的插件数据到本地文件</div>
          </div>
          <div class="setting-control">
            <label class="toggle-switch">
              <input type="checkbox" id="auto-backup-toggle" />
              <span class="toggle-slider"></span>
            </label>
          </div>
        </div>

        <div class="setting-row">
          <div class="setting-label">
            <div class="setting-title">备份间隔</div>
            <div class="setting-description">设置自动备份的时间间隔</div>
          </div>
          <div class="setting-control">
            <select class="setting-select" id="backup-interval-select">
              <option value="1">每小时</option>
              <option value="6">每 6 小时</option>
              <option value="12">每 12 小时</option>
              <option value="24" selected>每天</option>
              <option value="48">每 2 天</option>
              <option value="168">每周</option>
            </select>
          </div>
        </div>

        <div class="setting-row">
          <div class="setting-label">
            <div class="setting-title">最大备份数量</div>
            <div class="setting-description">保留的备份文件数量，超出后自动删除旧备份</div>
          </div>
          <div class="setting-control">
            <select class="setting-select" id="max-backups-select">
              <option value="3">3 个</option>
              <option value="5">5 个</option>
              <option value="7" selected>7 个</option>
              <option value="10">10 个</option>
              <option value="0">不限制</option>
            </select>
          </div>
        </div>

        <div class="setting-row">
          <div class="setting-label">
            <div class="setting-title">备份文件夹名称</div>
            <div class="setting-description">在 Downloads 文件夹中创建的子文件夹名称</div>
          </div>
          <div class="setting-control">
            <input type="text" class="setting-select" id="folder-name-input" placeholder="bro_chat_backups" />
          </div>
        </div>

        <div class="setting-row">
          <div class="setting-label">
            <div class="setting-title">每次备份弹出保存对话框</div>
            <div class="setting-description">开启后每次备份都会提示选择保存位置（可手动选择任意文件夹）</div>
          </div>
          <div class="setting-control">
            <label class="toggle-switch">
              <input type="checkbox" id="save-as-toggle" />
              <span class="toggle-slider"></span>
            </label>
          </div>
        </div>

        <div class="button-group">
          <button class="btn btn-success" id="save-settings-btn">💾 保存设置</button>
        </div>
      </section>

      <!-- 备份历史 -->
      <section class="section">
        <h2 class="section-title">📜 备份历史</h2>
        <div id="backup-history-list" class="backup-history">
          <div class="empty-history">暂无备份记录</div>
        </div>
      </section>

      <!-- 状态消息 -->
      <div id="backup-status-message" class="status-message"></div>
    </div>

    <script src="backup.js"></script>
  </body>
</html>
