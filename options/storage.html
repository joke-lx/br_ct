<!DOCTYPE html>
<html>
  <head>
    <meta charset="UTF-8" />
    <title>存储调试</title>
    <link rel="stylesheet" href="options.css" />
  </head>
  <body>
    <div class="page-container">
      <header class="page-header">
        <h1 class="page-title">🔍 存储调试</h1>
        <p class="page-description">
          查看插件在 chrome.storage.local 中存储的所有数据
        </p>
      </header>

      <section class="section">
        <div class="debug-controls">
          <button class="btn btn-success" id="refresh-storage">🔄 刷新</button>
          <button class="btn btn-danger" id="clear-storage">🗑️ 清空</button>
        </div>

        <div class="debug-content" id="storage-debug-content">
          <!-- 存储数据将由 JavaScript 动态生成 -->
        </div>

        <div id="storage-status-message" class="status-message"></div>
      </section>
    </div>

    <script src="storage.js"></script>
  </body>
</html>
